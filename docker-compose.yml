services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    command: mosquitto -c /mosquitto/config/mosquitto.conf

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  orion:
    image: fiware/orion:3.10.1
    ports:
      - "1026:1026"
    depends_on:
      - mongo
    command: -dbhost mongo -logLevel DEBUG

  crate:
    image: crate:4.6.7
    ports:
      - "4200:4200"
    environment:
      - CRATE_HEAP_SIZE=1g
    volumes:
      - crate_data:/data

  quantumleap:
    image: orchestracities/quantumleap:0.8.3
    ports:
      - "8668:8668"
    depends_on:
      - orion
      - crate
    environment:
      - CRATE_HOST=crate

  nodered:
    image: nodered/node-red:latest
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
    volumes:
      - nodered_data:/data

volumes:
  mosquitto_data:
  mosquitto_log:
  mongo_data:
  crate_data:
  nodered_data: